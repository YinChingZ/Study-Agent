{% extends "base.html" %}
{% block title %}设置 - StudyAgent{% endblock %}
{% block content %}
<div x-data="settingsPage()" x-init="loadConfig(); checkChrome()" class="space-y-4">
    <section class="bg-gray-800 rounded-lg border border-gray-700 p-4 space-y-3">
        <h2 class="text-lg font-medium">API Key 配置</h2>
        <p class="text-xs text-gray-400">留空表示保持已有 Key，不会在保存时清空。</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
                <label class="text-sm text-gray-300">OpenAI API Key</label>
                <input x-model="form.api_keys.OPENAI_API_KEY" type="password" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2" placeholder="sk-...">
            </div>
            <div>
                <label class="text-sm text-gray-300">Anthropic API Key</label>
                <input x-model="form.api_keys.ANTHROPIC_API_KEY" type="password" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2" placeholder="sk-ant-...">
            </div>
            <div>
                <label class="text-sm text-gray-300">Google API Key</label>
                <input x-model="form.api_keys.GOOGLE_API_KEY" type="password" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2" placeholder="AIza...">
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button @click="validateKey('browser')" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm">验证 Browser Agent Key</button>
            <button @click="validateKey('solver')" class="bg-indigo-700 hover:bg-indigo-600 px-3 py-2 rounded text-sm">验证 Solver Agent Key</button>
            <span class="text-sm" x-text="validateResult"></span>
        </div>
    </section>

    <section class="bg-gray-800 rounded-lg border border-gray-700 p-4 space-y-3">
        <h2 class="text-lg font-medium">Browser Agent 模型配置</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
                <label class="text-sm text-gray-300">Provider</label>
                <select x-model="form.browser_llm.provider" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="google">Google</option>
                </select>
            </div>
            <div>
                <label class="text-sm text-gray-300">Model</label>
                <input x-model="form.browser_llm.model" type="text" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
            </div>
            <div>
                <label class="text-sm text-gray-300">Base URL</label>
                <input x-model="form.browser_llm.base_url" type="text" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2" placeholder="使用第三方中转 API 时填写">
            </div>
        </div>
    </section>

    <section class="bg-gray-800 rounded-lg border border-gray-700 p-4 space-y-3">
        <div class="flex items-center justify-between gap-3">
            <h2 class="text-lg font-medium">Solver Agent 模型配置</h2>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="sameAsBrowser"> 与 Browser Agent 使用相同配置
            </label>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3" :class="sameAsBrowser ? 'opacity-60 pointer-events-none' : ''">
            <div>
                <label class="text-sm text-gray-300">Provider</label>
                <select x-model="form.solver_llm.provider" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="google">Google</option>
                </select>
            </div>
            <div>
                <label class="text-sm text-gray-300">Model</label>
                <input x-model="form.solver_llm.model" type="text" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
            </div>
            <div>
                <label class="text-sm text-gray-300">Base URL</label>
                <input x-model="form.solver_llm.base_url" type="text" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2" placeholder="使用第三方中转 API 时填写">
            </div>
        </div>
    </section>

    <section class="bg-gray-800 rounded-lg border border-gray-700 p-4 space-y-3">
        <h2 class="text-lg font-medium">浏览器配置</h2>
        <div class="text-sm" x-text="chromeStatus"></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" x-model="form.browser.auto_launch_chrome"> 自动启动 Chrome
            </label>
            <div>
                <label class="text-sm text-gray-300">CDP 端口</label>
                <input x-model.number="form.browser.cdp_port" type="number" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
            </div>
        </div>
    </section>

    <section class="bg-gray-800 rounded-lg border border-gray-700 p-4 space-y-3">
        <details>
            <summary class="cursor-pointer font-medium">高级设置</summary>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                <div>
                    <label class="text-sm text-gray-300">最大步数</label>
                    <input x-model.number="form.agent.max_steps" type="number" class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2">
                </div>
                <label class="flex items-center gap-2 text-sm mt-6">
                    <input type="checkbox" x-model="form.agent.use_vision"> 视觉模式
                </label>
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" x-model="form.agent.use_thinking"> 思考模式
                </label>
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" x-model="form.agent.demo_mode"> Demo 模式
                </label>
            </div>
        </details>
    </section>

    <button @click="saveConfig" class="bg-green-600 hover:bg-green-500 px-5 py-2 rounded">保存配置</button>
</div>
{% endblock %}
