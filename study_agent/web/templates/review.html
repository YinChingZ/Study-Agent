{% extends "base.html" %}
{% block title %}题目回顾 - StudyAgent{% endblock %}
{% block content %}
<div x-data="reviewPage()" x-init="loadSessions()" class="space-y-4">
    <section class="bg-gray-800 rounded-lg border border-gray-700 p-4">
        <h2 class="text-lg font-medium mb-3">历史会话</h2>
        <div class="space-y-2">
            <template x-for="session in sessions" :key="session.id">
                <div class="border border-gray-700 rounded p-3">
                    <div class="flex items-center justify-between gap-2">
                        <div class="text-sm">
                            <div x-text="`#${session.id} ${new Date(session.start_time).toLocaleString()}`"></div>
                            <div class="text-gray-400" x-text="session.task_url || '无任务 URL'"></div>
                        </div>
                        <button @click="toggleSession(session.id)" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">查看详情</button>
                    </div>
                    <div class="text-xs text-gray-400 mt-1" x-text="`题目数：${session.total_questions} | 状态：${session.status}`"></div>
                    <div class="mt-3 space-y-2" x-show="openSessionId === session.id">
                        <template x-for="q in details[session.id]?.questions || []" :key="q.id">
                            <details class="bg-gray-900 border border-gray-700 rounded p-2">
                                <summary class="cursor-pointer text-sm" x-text="q.question_text.slice(0, 80)"></summary>
                                <div class="mt-2 text-sm space-y-2">
                                    <div><span class="text-gray-400">答案：</span><span x-text="q.answer"></span></div>
                                    <div><span class="text-gray-400">推理：</span><span x-text="q.reasoning"></span></div>
                                    <template x-if="q.has_screenshot">
                                        <div>
                                            <button @click="loadScreenshot(q)" x-show="!q._screenshotLoaded"
                                                class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded">
                                                加载截图
                                            </button>
                                            <img x-show="q._screenshotLoaded" :src="q._screenshotSrc"
                                                class="max-h-48 object-contain border border-gray-700 rounded">
                                        </div>
                                    </template>
                                </div>
                            </details>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </section>
</div>
{% endblock %}
